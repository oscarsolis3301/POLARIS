# Proves the kit on every OS it claims to support. Until this existed, POLARIS had only ever
# run on one Windows box: ops/polaris's header promises "Bash >= 3.2 (macOS default) compatible"
# and nothing had ever executed that promise.
name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    # Daily. This is what catches "bumped ops/VERSION, forgot to tag it" — the 5.2.0 bug, where
    # every installed kit was nagged for days about an update releases/latest could not deliver.
    # It has to be a SCHEDULE and not a push check: see the consistency job.
    - cron: '17 9 * * *'

jobs:
  # A release must land EVERYWHERE or it hasn't happened. This repo has shipped the same class of
  # bug twice, and both times it was silent:
  #   5.2.0 — ops/VERSION was bumped on main but never tagged. Every installed kit was told a 5.2.0
  #           existed; releases/latest still served 5.1.0. The update they were nagged about could
  #           not be downloaded.
  #   5.3.0 — the CHANGELOG documented a version that ops/VERSION on main did not yet claim, so
  #           `polaris version` reported "up to date" while being two minor versions behind.
  # There are four places a version lives — ops/VERSION (the update channel), the CHANGELOG, the git
  # tag, and the published release — and a human is not a reliable synchroniser of four things.
  # So: assert it. Red here means the world is inconsistent, which is exactly what it should mean.
  consistency:
    name: one version, everywhere
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }        # tags, not just the tip

      - name: kit/ops/VERSION == newest CHANGELOG entry == git tag == published release
        run: |
          set -eu
          ver="$(sed -n 's/^version: *//p' kit/ops/VERSION | head -1)"
          [ -n "$ver" ] || { echo "::error::kit/ops/VERSION has no version: line"; exit 1; }
          echo "kit/ops/VERSION:    $ver"

          # 1. CHANGELOG — the newest `## X.Y.Z` heading must BE this version.
          log="$(grep -m1 -oE '^## [0-9]+\.[0-9]+\.[0-9]+' CHANGELOG.md | sed 's/^## //')"
          echo "CHANGELOG (newest): $log"
          [ "$ver" = "$log" ] || {
            echo "::error::kit/ops/VERSION is $ver but the newest CHANGELOG entry is $log — bump both or neither."
            exit 1
          }

          # 2. Docs must not quote a stale version back at the user.
          bad=$(grep -rhoE 'POLARIS [0-9]+\.[0-9]+\.[0-9]+' README.md kit/.claude/skills/ kit/ops/*.md 2>/dev/null \
                  | sed 's/^POLARIS //' | sort -u | grep -vFx "$ver" || true)
          [ -z "$bad" ] || {
            echo "::error::docs quote version(s) [$(echo $bad | tr '\n' ' ')] but kit/ops/VERSION is $ver — sweep them."
            exit 1
          }
          echo "docs:               clean"

          # 3+4. Tag + published release — SCHEDULED runs only, deliberately NOT on push.
          #
          # These two are facts about the WORLD, not about the commit, and checking them on a push
          # races the very release you are cutting: `git push main` necessarily happens before
          # `git push --tags`, so the tag cannot exist when the push's CI runs. Enforcing it there
          # turns every legitimate release red — and a guard that cries wolf on every release is a
          # guard someone deletes, which leaves you with no guard at all. (It did exactly that, once,
          # before this comment existed.)
          #
          # release.yml already hard-asserts tag == kit/ops/VERSION at publish time, so a WRONG release
          # is impossible. What remains is a MISSING one — "bumped, never tagged", the 5.2.0 bug —
          # and that is a slow failure, so a daily check catches it long before anyone is hurt.
          case "$GITHUB_EVENT_NAME" in
            schedule|workflow_dispatch) ;;
            *) echo "✅ repo self-consistent at $ver (tag/release/dogfood checked on the daily run)"; exit 0;;
          esac

          git rev-parse -q --verify "refs/tags/v$ver" >/dev/null || {
            echo "::error::kit/ops/VERSION says $ver but there is no v$ver tag. Every installed kit is being"
            echo "::error::told $ver exists while releases/latest still serves the old zip — the 5.2.0 bug."
            echo "::error::Cut it:  git tag v$ver && git push origin v$ver"
            exit 1
          }
          echo "git tag:            v$ver"

          rel="$(curl -fsSL https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/latest \
                  | sed -n 's/.*"tag_name": *"\([^"]*\)".*/\1/p' | head -1)"
          echo "releases/latest:    ${rel:-<none>}"
          [ "$rel" = "v$ver" ] || {
            echo "::error::releases/latest serves ${rel:-nothing}, but kit/ops/VERSION advertises $ver."
            echo "::error::A fresh machine curls releases/latest — it would install the WRONG kit."
            exit 1
          }

          # 5. THE DOGFOOD. This repo self-hosts POLARIS: root ops/ is a real installation, and it is
          # what `main`'s tarball and the raw channel URL serve to every kit installed before this
          # layout existed. Refreshing it (python kit/ops/pack.py --dogfood) is not housekeeping — it
          # is the ONLY test that takes a release through the path a stranger walks: download the
          # published zip, install it, run a real board with it. Skip it and we are shipping a kit we
          # never ran, while the compatibility surface at the repo root quietly rots.
          inst="$(sed -n 's/^version: *//p' ops/VERSION | head -1)"
          echo "ops/VERSION (ours): $inst"
          [ "$inst" = "$ver" ] || {
            echo "::error::we published $ver but this repo still runs $inst — the release was never dogfooded."
            echo "::error::It also means main's tarball and the raw channel still serve $inst to installed kits."
            echo "::error::Fix it:  python kit/ops/pack.py --dogfood   (then commit the refreshed ops/)"
            exit 1
          }
          echo "✅ one version, everywhere — and we run it ourselves: $ver"

  kit:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false            # a macOS-only break must not hide a Windows-only break
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        shell: bash              # on Windows this is Git Bash — the shell POLARIS actually targets
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Toolchain
        run: |
          bash --version | head -1
          git --version
          python --version
          echo "PATH bash: $(command -v bash)"

      - name: Pack the kit
        run: python kit/ops/pack.py

      - name: The zip carries the PRODUCT, never our board
        # This repo self-hosts POLARIS, so a live board (tasks, telemetry, MAP, SPRINT, CONVENTIONS,
        # RULES) sits at the root ops/ — git-tracked, right next to the source. pack.py excludes it
        # structurally, by listing only what is under kit/. This step is the proof, and it guards two
        # different disasters at once:
        #   * we hand every user our board, our sprint goals and our telemetry;
        #   * worse, they receive a CONVENTIONS.md — and a target that HAS one IS a live board by
        #     definition (install.sh's own test), so INIT refuses to run and the install is bricked.
        # It is a one-line fix to reintroduce and invisible until a stranger reports it. Assert it.
        run: |
          python - <<'PY'
          import sys, zipfile
          FORBIDDEN = ("CONVENTIONS.md", "MAP.md", "SPRINT.md", "RULES.tsv")
          names = zipfile.ZipFile("polaris-v5.zip").namelist()
          bad = [n for n in names
                 if n.rsplit("/", 1)[-1] in FORBIDDEN
                 or "/board/" in n
                 or n.startswith("polaris-v5/.github/")]
          for n in sorted(bad):
              print(f"::error::{n} is in the kit — that is OUR board leaking into a stranger's repo")
          if bad:
              sys.exit(1)
          print(f"kit is clean: {len(names)} entries, no board artifacts")
          PY

      - name: Installing from the REPO ROOT — the old-client path — is also clean
        # `polaris update` downloads the branch tarball and runs `<root>/ops/install.sh`. In a
        # self-hosting repo that root ops/ is our INSTANCE, so every kit installed before the kit/
        # split reaches for our board directory and installs FROM it. That path has to be as safe as
        # the zip, and two things in install.sh had to change for it to be:
        #   * the copy list is named, not `ops/*.md` — a glob here would rake in CONVENTIONS.md,
        #     MAP.md and SPRINT.md and lock INIT out of the target;
        #   * emit_block unwraps the source CLAUDE.md, because ours IS a managed block now — cat it
        #     raw and every update nests another marker pair until uninstall can no longer delimit it.
        # Simulate that client exactly: install from the checkout root, not from the zip.
        run: |
          set -e
          OLD="$RUNNER_TEMP/oldclient"; rm -rf "$OLD"; mkdir -p "$OLD"; cd "$OLD"
          git init -qb main && git config user.email ci@example.com && git config user.name ci
          printf '# Their Project\n\nTHEIR_RULE: do not break the build.\n' > CLAUDE.md
          git add -A && git commit -qm init

          bash "$GITHUB_WORKSPACE/ops/install.sh" "$OLD"

          test ! -f ops/CONVENTIONS.md || { echo "::error::our CONVENTIONS.md leaked — the target now looks like a live board and INIT cannot run"; exit 1; }
          test ! -f ops/MAP.md         || { echo "::error::our MAP.md leaked into a stranger's repo"; exit 1; }
          test ! -f ops/SPRINT.md      || { echo "::error::our SPRINT.md leaked into a stranger's repo"; exit 1; }
          test ! -f ops/RULES.tsv      || { echo "::error::our RULES.tsv leaked into a stranger's repo"; exit 1; }
          test ! -d ops/board          || { echo "::error::our board/ leaked into a stranger's repo"; exit 1; }
          test -x ops/polaris          || { echo "::error::no runnable ops/polaris — the old-client update path is broken"; exit 1; }

          b=$(grep -cF 'POLARIS:BEGIN' CLAUDE.md); e=$(grep -cF 'POLARIS:END' CLAUDE.md)
          [ "$b" = 1 ] && [ "$e" = 1 ] || { echo "::error::CLAUDE.md has $b BEGIN / $e END markers — nested block; uninstall could not delimit it"; exit 1; }
          grep -q THEIR_RULE CLAUDE.md || { echo "::error::install ate the user's CLAUDE.md"; exit 1; }
          grep -q 'ROLE DISPATCH' CLAUDE.md || { echo "::error::the managed block carries no protocol — emit_block unwrapped too much"; exit 1; }
          echo "old-client install OK"

      - name: Archive integrity — exec bits, LF, zipapp, no .git
        # Read the mode STORED IN THE ARCHIVE, not the extracted file. Windows has no real exec
        # bit and Git Bash fakes `test -x`, so an extraction-based check would pass vacuously and
        # let the dead-on-arrival bug straight back in. The stored mode is the actual invariant
        # and is identical on all three runners.
        run: |
          python - <<'PY'
          import sys, zipfile
          NEED_EXEC = {
              "polaris-v5/ops/polaris",
              "polaris-v5/ops/install.sh",
              "polaris-v5/ops/hooks/ownership-guard.sh",
          }
          z = zipfile.ZipFile("polaris-v5.zip")
          names = set(z.namelist())
          bad = []

          if "__main__.py" not in names:
              bad.append("__main__.py missing from the archive root — not a zipapp")

          for want in NEED_EXEC:
              if want not in names:
                  bad.append(f"{want} missing"); continue
              mode = (z.getinfo(want).external_attr >> 16) & 0o777
              if not mode & 0o111:
                  bad.append(f"{want} lost its exec bit (mode {mode:o}) — kit would be DOA")

          for info in z.infolist():
              if info.filename.startswith("polaris-v5/.git/"):
                  bad.append(".git leaked into the archive")
              if not info.is_dir() and b"\r\n" in z.read(info.filename):
                  bad.append(f"CRLF in {info.filename} — bash cannot execute a CRLF script")

          print(f"{len(names)} entries; exec: {sorted(n for n in NEED_EXEC if n in names)}")
          if bad:
              for b in sorted(set(bad)):
                  print(f"::error::{b}")
              sys.exit(1)
          print("archive OK")
          PY

      - name: --claude-skill — caches the kit, pre-authorizes, clobbers nothing
        # The path Claude Code actually installs through. Until 5.3.0 the skill told the agent to
        # curl the zip from GitHub and execute it — which the permission classifier DENIES whenever
        # the user hasn't named that URL themselves, so every fresh-repo install died and looked
        # like a broken kit. The cure is a cached kit (no download) plus rules in the user's own
        # settings (no prompt) — and both must land without harming a settings.json that already
        # carries someone's hooks, statusline and permissions.
        #
        # HOME *and* USERPROFILE: ntpath.expanduser reads USERPROFILE and ignores HOME outright, so
        # a HOME-only fake would silently test the runner's real profile on Windows and prove nothing.
        run: |
          set -e
          FAKE="$RUNNER_TEMP/home"
          SK="$FAKE/.claude/skills/polaris-install"
          mkdir -p "$FAKE/.claude"
          printf '{"statusLine":{"command":"MY_OWN_STATUSLINE"},"permissions":{"allow":["Bash(MY_OWN_RULE)"],"deny":["Read(./.env)"]}}\n' > "$FAKE/.claude/settings.json"

          HOME="$FAKE" USERPROFILE="$FAKE" python polaris-v5.zip --claude-skill
          HOME="$FAKE" USERPROFILE="$FAKE" python polaris-v5.zip --claude-skill   # must be idempotent

          test -f "$SK/SKILL.md"       || { echo "::error::--claude-skill did not install SKILL.md"; exit 1; }
          test -f "$SK/polaris-v5.zip" || { echo "::error::--claude-skill did not cache the kit — installs would still need a download"; exit 1; }
          cmp -s "$SK/polaris-v5.zip" polaris-v5.zip || { echo "::error::cached kit differs from the built zip"; exit 1; }

          # Re-running FROM the cached copy must not open its own source for writing and truncate it.
          HOME="$FAKE" USERPROFILE="$FAKE" python "$SK/polaris-v5.zip" --claude-skill
          cmp -s "$SK/polaris-v5.zip" polaris-v5.zip || { echo "::error::cached kit destroyed itself on a self-run"; exit 1; }

          FAKE="$FAKE" python - <<'PY'
          import json, os, sys
          s = json.load(open(os.path.join(os.environ["FAKE"], ".claude", "settings.json")))
          allow = s["permissions"]["allow"]
          bad = []
          if "Bash(MY_OWN_RULE)" not in allow:
              bad.append("an existing allow rule was lost")
          if s["permissions"].get("deny") != ["Read(./.env)"]:
              bad.append("the existing deny list was lost")
          if s.get("statusLine", {}).get("command") != "MY_OWN_STATUSLINE":
              bad.append("an unrelated top-level key was lost")
          if not any(r.startswith("Bash(python polaris-v5.zip") for r in allow):
              bad.append("POLARIS rules were not merged into permissions.allow")
          if len(allow) != len(set(allow)):
              bad.append("duplicate rules — the merge is not idempotent")
          for b in bad:
              print(f"::error::{b}")
          sys.exit(1 if bad else 0)
          PY

          # --no-permissions: still caches, but settings.json must come out byte-identical.
          F2="$RUNNER_TEMP/home2"
          mkdir -p "$F2/.claude"
          printf '{"permissions":{"allow":[]}}\n' > "$F2/.claude/settings.json"
          cp "$F2/.claude/settings.json" "$RUNNER_TEMP/before.json"
          HOME="$F2" USERPROFILE="$F2" python polaris-v5.zip --claude-skill --no-permissions
          test -f "$F2/.claude/skills/polaris-install/polaris-v5.zip" || { echo "::error::--no-permissions skipped the cache too"; exit 1; }
          cmp -s "$F2/.claude/settings.json" "$RUNNER_TEMP/before.json" || { echo "::error::--no-permissions wrote to settings.json anyway"; exit 1; }

          # Unparseable settings are left ALONE — never rewritten, never fatal.
          F3="$RUNNER_TEMP/home3"
          mkdir -p "$F3/.claude"
          printf 'this is not json' > "$F3/.claude/settings.json"
          HOME="$F3" USERPROFILE="$F3" python polaris-v5.zip --claude-skill
          grep -qx 'this is not json' "$F3/.claude/settings.json" || { echo "::error::a malformed settings.json was overwritten"; exit 1; }
          echo "--claude-skill OK"

      - name: Drag-and-run install into a scratch repo — quiet, and it arms the machine
        # 5.4.0: a normal install now ALSO arms the machine (skill + cached kit + permission rules
        # in ~/.claude), because a separate --claude-skill step nobody knew about is a step nobody
        # ran — and its absence is what made installs get denied in some *other* repo weeks later.
        # $HOME is faked so this is hermetic AND assertable. USERPROFILE too: ntpath.expanduser
        # ignores HOME outright, so a HOME-only fake would test the runner's real profile on Windows.
        run: |
          set -eo pipefail          # `| tee` must not swallow a failed install
          APP="$RUNNER_TEMP/app"
          mkdir -p "$APP/src"
          cd "$APP"
          git init -qb main
          git config user.email ci@example.com
          git config user.name ci
          # a project that already has its own CLAUDE.md and its own hook — the hard case
          printf '# Existing App\n\nMY_OWN_RULE\n' > CLAUDE.md
          mkdir -p .claude
          printf '{"hooks":{"PreToolUse":[{"matcher":"Bash","hooks":[{"type":"command","command":"echo MY_OWN_HOOK"}]}]}}\n' > .claude/settings.json
          echo "print(1)" > src/app.py
          git add -A && git commit -qm pristine
          cp "$GITHUB_WORKSPACE/polaris-v5.zip" .

          HI="$RUNNER_TEMP/home-install"; mkdir -p "$HI"
          echo "HI=$HI" >> "$GITHUB_ENV"
          HOME="$HI" USERPROFILE="$HI" python polaris-v5.zip | tee "$RUNNER_TEMP/install.log"

          # Quiet by default: the marker, plus at most the one-off "machine armed" line. An agent
          # relays whatever the installer prints, so a chatty installer IS a chatty agent. The ONE
          # sanctioned extra block is the "▶ NEXT" run-INIT epilogue on a fresh install (5.9.1) —
          # a machine's first-ever install has no skill loaded, so the epilogue is the only thing
          # that chains into INIT. Count the lines above it only, and assert it is present.
          n=$(sed '/^▶ NEXT/,$d' "$RUNNER_TEMP/install.log" | grep -c .)
          [ "$n" -le 2 ] || { echo "::error::quiet install printed $n lines before the epilogue (expected <= 2)"; cat "$RUNNER_TEMP/install.log"; exit 1; }
          grep -q 'read ops/roles/INIT.md' "$RUNNER_TEMP/install.log" || { echo "::error::fresh install is missing the run-INIT agent epilogue"; exit 1; }
          # Quiet must not mean undiagnosable: every ✅/note line still lands in the log.
          test -s .polaris/install.log || { echo "::error::.polaris/install.log missing or empty — a quiet failure would be undiagnosable"; exit 1; }
          grep -q 'ops/ installed' .polaris/install.log || { echo "::error::.polaris/install.log is not capturing the install detail"; exit 1; }

          # ...and the machine is now armed, without anyone having to know about --claude-skill.
          test -f "$HI/.claude/skills/polaris-install/SKILL.md"     || { echo "::error::a normal install did not install the skill"; exit 1; }
          test -f "$HI/.claude/skills/polaris-install/polaris-v5.zip" || { echo "::error::a normal install did not cache the kit — the NEXT repo would need a download"; exit 1; }
          grep -q 'Bash(bash ops/polaris' "$HI/.claude/settings.json" || { echo "::error::a normal install did not pre-authorize the commands"; exit 1; }
          echo "quiet install + machine arming OK"

      - name: --no-machine-setup writes nothing outside the repo
        run: |
          set -e
          F4="$RUNNER_TEMP/home4"; T4="$RUNNER_TEMP/app4"
          mkdir -p "$F4" "$T4"; cd "$T4"
          git init -qb main; git config user.email ci@example.com; git config user.name ci
          git commit -q --allow-empty -m init
          cp "$GITHUB_WORKSPACE/polaris-v5.zip" .
          HOME="$F4" USERPROFILE="$F4" python polaris-v5.zip --no-machine-setup
          test ! -d "$F4/.claude" || { echo "::error::--no-machine-setup wrote to ~/.claude anyway"; exit 1; }
          test -x ops/polaris     || { echo "::error::--no-machine-setup skipped the repo install too"; exit 1; }
          echo "--no-machine-setup OK"

      - name: A fresh install is NOT a live board
        # The 5.2.0 regression guard. The installer used to ship the six empty board columns, so
        # every fresh install looked initialized: CLAUDE.md's dispatch never offered INIT, INIT.md's
        # precondition told the agent to refuse, and a re-run announced "live board detected".
        # ops/CONVENTIONS.md — written by INIT and by nothing else — is now the only test.
        #
        # The routing contract is the last token of the installer's one line: `fresh` | `live-board`.
        # It replaced a grep for "You are INIT" — 5.4.0 deleted that sentence, because the installing
        # session now runs INIT itself instead of telling you to go open another chat.
        run: |
          set -eo pipefail
          cd "$RUNNER_TEMP/app"
          test ! -d ops/board          || { echo "::error::installer created ops/board/ — a fresh install must not look initialized"; exit 1; }
          test ! -f ops/CONVENTIONS.md || { echo "::error::installer wrote CONVENTIONS.md — only INIT may"; exit 1; }
          grep -q 'installed · fresh' "$RUNNER_TEMP/install.log" || { echo "::error::installer did not route a fresh repo to INIT (no 'fresh' token)"; exit 1; }
          ! grep -q 'You are INIT' "$RUNNER_TEMP/install.log" || { echo "::error::the 'open a new session' instruction is back — 5.4.0 removed it deliberately"; exit 1; }
          # Capture, THEN grep. `doctor | grep -q` is a trap: grep -q exits on the first match and
          # closes the pipe, doctor dies of SIGPIPE (141), and `pipefail` fails the whole pipeline
          # even though doctor said exactly what we wanted. That is what has been reddening this
          # job since the step was written — a bug in the test, never in doctor.
          bash ops/polaris doctor > "$RUNNER_TEMP/doctor.log"
          grep -q 'INIT has not run' "$RUNNER_TEMP/doctor.log" || { echo "::error::doctor does not report the uninitialized repo"; exit 1; }
          # re-run must STILL route to INIT, not to `polaris upgrade`
          HOME="$HI" USERPROFILE="$HI" python polaris-v5.zip | tee "$RUNNER_TEMP/reinstall.log"
          grep -q 'installed · fresh' "$RUNNER_TEMP/reinstall.log" || { echo "::error::re-run misrouted an uninitialized repo"; exit 1; }
          ! grep -q 'live-board'      "$RUNNER_TEMP/reinstall.log" || { echo "::error::re-run called an uninitialized repo a live board"; exit 1; }
          # The machine is already armed, so a re-run must not nag about it a second time.
          ! grep -q 'machine armed'   "$RUNNER_TEMP/reinstall.log" || { echo "::error::'machine armed' printed on a re-run — arming is not idempotent"; exit 1; }
          echo "fresh-install predicate OK"

      - name: A live board IS detected (and never overwritten)
        run: |
          set -eo pipefail
          cd "$RUNNER_TEMP/app"
          bash ops/polaris init-board >/dev/null
          printf '# CONVENTIONS\nbase: main\nvoice: technical\ntest: echo hi\n' > ops/CONVENTIONS.md
          HOME="$HI" USERPROFILE="$HI" python polaris-v5.zip | tee "$RUNNER_TEMP/upgrade.log"
          grep -q 'installed · live-board' "$RUNNER_TEMP/upgrade.log" || { echo "::error::live board not detected"; exit 1; }
          # the detail still exists — it just moved off the user's screen and into the log
          grep -q 'live board detected' .polaris/install.log || { echo "::error::live-board detail missing from .polaris/install.log"; exit 1; }
          grep -q 'polaris upgrade'     .polaris/install.log || { echo "::error::live board not routed to upgrade"; exit 1; }
          grep -q 'voice: technical'    ops/CONVENTIONS.md   || { echo "::error::installer overwrote CONVENTIONS.md"; exit 1; }

      - name: update — refreshes the repo AND the machine, and survives overwriting itself
        # Two regressions guarded here, both of which shipped:
        #
        # 1. SELF-OVERWRITE. install.sh replaces ops/polaris — the file bash is still lazily
        #    reading, by byte offset. A script swapped mid-run resumes at the old offset inside the
        #    new bytes and executes garbage. Latent since `update` was written; it only survived
        #    while the old and new files happened to line up. `update` now re-execs from a temp
        #    copy first (as `uninstall` always has). Assert BOTH the behaviour and the guard: the
        #    byte-offset crash only reproduces when the files differ in length, which a same-commit
        #    update does not, so behaviour alone would silently stop testing anything.
        #
        # 2. STALE MACHINE CACHE. `update` used to fix one repo and leave ~/.claude holding the old
        #    kit — which is what every future "install POLARIS" copies from. So the NEXT repo
        #    silently got the old kit. That is how a 5.1.0 zip nearly landed on top of a 5.3.0 board.
        run: |
          set -eo pipefail
          grep -rq 'POLARIS_UPDATE_REEXEC' ops/polaris ops/lib/ \

            || { echo "::error::cmd_update lost its re-exec guard — it will corrupt itself when install.sh overwrites ops/polaris"; exit 1; }

          U="$RUNNER_TEMP/upd"; HU="$RUNNER_TEMP/home-upd"
          mkdir -p "$U" "$HU/.claude"
          cd "$U"
          git init -qb main; git config user.email ci@example.com; git config user.name ci
          git commit -q --allow-empty -m init
          cp "$GITHUB_WORKSPACE/polaris-v5.zip" .
          HOME="$HU" USERPROFILE="$HU" python polaris-v5.zip --no-machine-setup >/dev/null
          git add -A && git commit -qm polaris          # update refuses on a dirty worktree

          # Nothing in ~/.claude yet — this is the machine a stale cache would poison.
          test ! -f "$HU/.claude/skills/polaris-install/polaris-v5.zip" || { echo "::error::test setup wrong: cache already present"; exit 1; }

          HOME="$HU" USERPROFILE="$HU" bash ops/polaris update 2>&1 | tee "$RUNNER_TEMP/update.log"
          ! grep -qi 'syntax error' "$RUNNER_TEMP/update.log" \
            || { echo "::error::update corrupted itself while overwriting ops/polaris"; exit 1; }
          bash ops/polaris version >/dev/null || { echo "::error::ops/polaris is not runnable after update"; exit 1; }

          # ...and the machine is current, so the NEXT repo on this box gets the new kit.
          C="$HU/.claude/skills/polaris-install"
          test -f "$C/polaris-v5.zip" || { echo "::error::update did not refresh the machine's cached kit — the next repo would install a stale POLARIS"; exit 1; }
          test -f "$C/SKILL.md"       || { echo "::error::update did not refresh the cached skill"; exit 1; }
          python - "$C/polaris-v5.zip" > "$RUNNER_TEMP/cached.ver" <<'PY'
          import sys, zipfile
          z = zipfile.ZipFile(sys.argv[1])
          names = z.namelist()
          assert "polaris-v5/ops/polaris" in names, "cached kit is missing ops/polaris — it is not a kit"
          v = [n for n in names if n.endswith("ops/VERSION")]
          assert v, "cached kit carries no ops/VERSION"
          ver = [l.split(":", 1)[1].strip() for l in z.read(v[0]).decode().splitlines() if l.startswith("version:")]
          assert ver, "cached kit has no version: line"
          print(ver[0])
          PY
          CACHED="$(cat "$RUNNER_TEMP/cached.ver")"
          echo "  cached kit is $CACHED"

          # 3. THE MESSAGE MUST NOT LIE. `update` used to announce the version it HOPED it had
          #    cached (the repo's) rather than the one it actually downloaded. releases/latest lags
          #    a fresh tag by ~a minute, so an update run right after a release caches the PREVIOUS
          #    kit while cheerfully claiming otherwise — the same silent skew this feature exists to
          #    kill. Whatever version it reports must be the version in the bytes on disk.
          grep -qF "$CACHED" "$RUNNER_TEMP/update.log" \
            || { echo "::error::update cached $CACHED but never said so — its report does not match what it wrote"; cat "$RUNNER_TEMP/update.log"; exit 1; }
          echo "update OK"

      - name: --repo-only leaves the machine cache alone
        run: |
          set -eo pipefail
          U2="$RUNNER_TEMP/upd2"; H2="$RUNNER_TEMP/home-upd2"
          mkdir -p "$U2" "$H2/.claude"
          cd "$U2"
          git init -qb main; git config user.email ci@example.com; git config user.name ci
          git commit -q --allow-empty -m init
          cp "$GITHUB_WORKSPACE/polaris-v5.zip" .
          HOME="$H2" USERPROFILE="$H2" python polaris-v5.zip --no-machine-setup >/dev/null
          git add -A && git commit -qm polaris
          HOME="$H2" USERPROFILE="$H2" bash ops/polaris update --repo-only >/dev/null 2>&1
          test ! -f "$H2/.claude/skills/polaris-install/polaris-v5.zip" \
            || { echo "::error::--repo-only refreshed the machine cache anyway"; exit 1; }
          echo "--repo-only OK"

      - name: --verbose still prints the full install log
        run: |
          set -eo pipefail
          cd "$RUNNER_TEMP/app"
          HOME="$HI" USERPROFILE="$HI" python polaris-v5.zip --verbose | tee "$RUNNER_TEMP/verbose.log"
          n=$(grep -c . "$RUNNER_TEMP/verbose.log")
          [ "$n" -ge 5 ] || { echo "::error::--verbose printed only $n lines — the escape hatch is broken"; exit 1; }
          grep -q 'installed · live-board' "$RUNNER_TEMP/verbose.log" || { echo "::error::--verbose lost the routing marker"; exit 1; }
          echo "--verbose OK"
          bash ops/polaris doctor > "$RUNNER_TEMP/doctor-voice.log"     # not `| grep -q` — see SIGPIPE note above
          grep -q 'voice: technical' "$RUNNER_TEMP/doctor-voice.log" || { echo "::error::doctor does not report the configured voice"; exit 1; }
          # leave the scratch repo uninitialized again, so the steps below see a virgin install
          rm -rf ops/CONVENTIONS.md ops/board ops/contracts
          echo "live-board predicate OK"

      - name: Merge was non-destructive
        run: |
          set -e
          cd "$RUNNER_TEMP/app"
          grep -q MY_OWN_RULE CLAUDE.md            || { echo "::error::user CLAUDE.md content lost"; exit 1; }
          grep -qF 'POLARIS:BEGIN' CLAUDE.md       || { echo "::error::managed block markers missing"; exit 1; }
          grep -q MY_OWN_HOOK .claude/settings.json|| { echo "::error::user hook lost"; exit 1; }
          grep -q ownership-guard .claude/settings.json || { echo "::error::guard hook not merged"; exit 1; }
          python -c "import json;json.load(open('.claude/settings.json'))"
          test -f src/app.py                       || { echo "::error::user source lost"; exit 1; }
          echo "merge OK"

      - name: doctor --selftest  (the full mechanics drill)
        run: |
          cd "$RUNNER_TEMP/app"
          bash ops/polaris doctor --selftest

      - name: macOS — the same drill under /bin/bash 3.2
        # THE reason macOS is in this matrix. GitHub's macOS image puts a newer Homebrew bash
        # earlier on PATH, so the step above silently tests bash 5 and proves nothing about the
        # 3.2 compatibility the script claims. Pin the interpreter and assert the version.
        if: matrix.os == 'macos-latest'
        run: |
          set -e
          V="$(/bin/bash -c 'echo $BASH_VERSION')"
          echo "/bin/bash is $V"
          case "$V" in 3.2*) ;; *) echo "::error::expected bash 3.2 at /bin/bash, got $V"; exit 1;; esac
          cd "$RUNNER_TEMP/app"
          /bin/bash ops/polaris doctor --selftest

      - name: Uninstall leaves the repo as it was found
        run: |
          set -e
          cd "$RUNNER_TEMP/app"
          bash ops/polaris uninstall --yes
          test ! -d ops                              || { echo "::error::ops/ survived uninstall"; exit 1; }
          grep -q MY_OWN_RULE CLAUDE.md              || { echo "::error::uninstall ate the user's CLAUDE.md"; exit 1; }
          ! grep -qF 'POLARIS:BEGIN' CLAUDE.md       || { echo "::error::managed block survived uninstall"; exit 1; }
          grep -q MY_OWN_HOOK .claude/settings.json  || { echo "::error::uninstall ate the user's hook"; exit 1; }
          ! grep -q ownership-guard .claude/settings.json || { echo "::error::guard hook survived uninstall"; exit 1; }
          echo "uninstall OK"

      - name: Uninstall removes the INSTANCE and keeps the PRODUCT
        # In this repo `uninstall` deletes ops/ — which is also, in every OTHER repo, the whole kit.
        # Here it must take the installation and leave kit/ standing, or "uninstall POLARIS" in the
        # POLARIS repo means "delete POLARIS". That is the sharpest edge the self-hosting split has,
        # so prove it on a throwaway clone of this very repo rather than reasoning about it.
        run: |
          set -e
          SH="$RUNNER_TEMP/selfhost"; rm -rf "$SH"
          git clone -q "$GITHUB_WORKSPACE" "$SH"
          cd "$SH"
          git config user.email ci@example.com && git config user.name ci
          bash ops/polaris uninstall --yes
          test ! -d ops               || { echo "::error::the instance survived uninstall"; exit 1; }
          test -f kit/ops/polaris     || { echo "::error::uninstall DELETED THE PRODUCT — kit/ops/polaris is gone"; exit 1; }
          test -f kit/ops/pack.py     || { echo "::error::uninstall deleted kit/ops/pack.py"; exit 1; }
          test -f kit/CLAUDE.md       || { echo "::error::uninstall deleted kit/CLAUDE.md — the protocol source"; exit 1; }
          test -f kit/.claude/skills/polaris-install/SKILL.md || { echo "::error::uninstall deleted the kit's skills"; exit 1; }
          python kit/ops/pack.py --allow-dirty >/dev/null || { echo "::error::the kit cannot rebuild itself after uninstall"; exit 1; }
          echo "uninstall took the instance, left the product"
