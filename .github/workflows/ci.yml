# Proves the kit on every OS it claims to support. Until this existed, POLARIS had only ever
# run on one Windows box: ops/polaris's header promises "Bash >= 3.2 (macOS default) compatible"
# and nothing had ever executed that promise.
name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  kit:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false            # a macOS-only break must not hide a Windows-only break
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        shell: bash              # on Windows this is Git Bash — the shell POLARIS actually targets
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Toolchain
        run: |
          bash --version | head -1
          git --version
          python --version
          echo "PATH bash: $(command -v bash)"

      - name: Pack the kit
        run: python ops/pack.py

      - name: Archive integrity — exec bits, LF, zipapp, no .git
        # Read the mode STORED IN THE ARCHIVE, not the extracted file. Windows has no real exec
        # bit and Git Bash fakes `test -x`, so an extraction-based check would pass vacuously and
        # let the dead-on-arrival bug straight back in. The stored mode is the actual invariant
        # and is identical on all three runners.
        run: |
          python - <<'PY'
          import sys, zipfile
          NEED_EXEC = {
              "polaris-v5/ops/polaris",
              "polaris-v5/ops/install.sh",
              "polaris-v5/ops/hooks/ownership-guard.sh",
          }
          z = zipfile.ZipFile("polaris-v5.zip")
          names = set(z.namelist())
          bad = []

          if "__main__.py" not in names:
              bad.append("__main__.py missing from the archive root — not a zipapp")

          for want in NEED_EXEC:
              if want not in names:
                  bad.append(f"{want} missing"); continue
              mode = (z.getinfo(want).external_attr >> 16) & 0o777
              if not mode & 0o111:
                  bad.append(f"{want} lost its exec bit (mode {mode:o}) — kit would be DOA")

          for info in z.infolist():
              if info.filename.startswith("polaris-v5/.git/"):
                  bad.append(".git leaked into the archive")
              if not info.is_dir() and b"\r\n" in z.read(info.filename):
                  bad.append(f"CRLF in {info.filename} — bash cannot execute a CRLF script")

          print(f"{len(names)} entries; exec: {sorted(n for n in NEED_EXEC if n in names)}")
          if bad:
              for b in sorted(set(bad)):
                  print(f"::error::{b}")
              sys.exit(1)
          print("archive OK")
          PY

      - name: --claude-skill — caches the kit, pre-authorizes, clobbers nothing
        # The path Claude Code actually installs through. Until 5.3.0 the skill told the agent to
        # curl the zip from GitHub and execute it — which the permission classifier DENIES whenever
        # the user hasn't named that URL themselves, so every fresh-repo install died and looked
        # like a broken kit. The cure is a cached kit (no download) plus rules in the user's own
        # settings (no prompt) — and both must land without harming a settings.json that already
        # carries someone's hooks, statusline and permissions.
        #
        # HOME *and* USERPROFILE: ntpath.expanduser reads USERPROFILE and ignores HOME outright, so
        # a HOME-only fake would silently test the runner's real profile on Windows and prove nothing.
        run: |
          set -e
          FAKE="$RUNNER_TEMP/home"
          SK="$FAKE/.claude/skills/polaris-install"
          mkdir -p "$FAKE/.claude"
          printf '{"statusLine":{"command":"MY_OWN_STATUSLINE"},"permissions":{"allow":["Bash(MY_OWN_RULE)"],"deny":["Read(./.env)"]}}\n' > "$FAKE/.claude/settings.json"

          HOME="$FAKE" USERPROFILE="$FAKE" python polaris-v5.zip --claude-skill
          HOME="$FAKE" USERPROFILE="$FAKE" python polaris-v5.zip --claude-skill   # must be idempotent

          test -f "$SK/SKILL.md"       || { echo "::error::--claude-skill did not install SKILL.md"; exit 1; }
          test -f "$SK/polaris-v5.zip" || { echo "::error::--claude-skill did not cache the kit — installs would still need a download"; exit 1; }
          cmp -s "$SK/polaris-v5.zip" polaris-v5.zip || { echo "::error::cached kit differs from the built zip"; exit 1; }

          # Re-running FROM the cached copy must not open its own source for writing and truncate it.
          HOME="$FAKE" USERPROFILE="$FAKE" python "$SK/polaris-v5.zip" --claude-skill
          cmp -s "$SK/polaris-v5.zip" polaris-v5.zip || { echo "::error::cached kit destroyed itself on a self-run"; exit 1; }

          FAKE="$FAKE" python - <<'PY'
          import json, os, sys
          s = json.load(open(os.path.join(os.environ["FAKE"], ".claude", "settings.json")))
          allow = s["permissions"]["allow"]
          bad = []
          if "Bash(MY_OWN_RULE)" not in allow:
              bad.append("an existing allow rule was lost")
          if s["permissions"].get("deny") != ["Read(./.env)"]:
              bad.append("the existing deny list was lost")
          if s.get("statusLine", {}).get("command") != "MY_OWN_STATUSLINE":
              bad.append("an unrelated top-level key was lost")
          if not any(r.startswith("Bash(python polaris-v5.zip") for r in allow):
              bad.append("POLARIS rules were not merged into permissions.allow")
          if len(allow) != len(set(allow)):
              bad.append("duplicate rules — the merge is not idempotent")
          for b in bad:
              print(f"::error::{b}")
          sys.exit(1 if bad else 0)
          PY

          # --no-permissions: still caches, but settings.json must come out byte-identical.
          F2="$RUNNER_TEMP/home2"
          mkdir -p "$F2/.claude"
          printf '{"permissions":{"allow":[]}}\n' > "$F2/.claude/settings.json"
          cp "$F2/.claude/settings.json" "$RUNNER_TEMP/before.json"
          HOME="$F2" USERPROFILE="$F2" python polaris-v5.zip --claude-skill --no-permissions
          test -f "$F2/.claude/skills/polaris-install/polaris-v5.zip" || { echo "::error::--no-permissions skipped the cache too"; exit 1; }
          cmp -s "$F2/.claude/settings.json" "$RUNNER_TEMP/before.json" || { echo "::error::--no-permissions wrote to settings.json anyway"; exit 1; }

          # Unparseable settings are left ALONE — never rewritten, never fatal.
          F3="$RUNNER_TEMP/home3"
          mkdir -p "$F3/.claude"
          printf 'this is not json' > "$F3/.claude/settings.json"
          HOME="$F3" USERPROFILE="$F3" python polaris-v5.zip --claude-skill
          grep -qx 'this is not json' "$F3/.claude/settings.json" || { echo "::error::a malformed settings.json was overwritten"; exit 1; }
          echo "--claude-skill OK"

      - name: Drag-and-run install into a scratch repo
        run: |
          set -eo pipefail          # `| tee` must not swallow a failed install
          APP="$RUNNER_TEMP/app"
          mkdir -p "$APP/src"
          cd "$APP"
          git init -qb main
          git config user.email ci@example.com
          git config user.name ci
          # a project that already has its own CLAUDE.md and its own hook — the hard case
          printf '# Existing App\n\nMY_OWN_RULE\n' > CLAUDE.md
          mkdir -p .claude
          printf '{"hooks":{"PreToolUse":[{"matcher":"Bash","hooks":[{"type":"command","command":"echo MY_OWN_HOOK"}]}]}}\n' > .claude/settings.json
          echo "print(1)" > src/app.py
          git add -A && git commit -qm pristine
          cp "$GITHUB_WORKSPACE/polaris-v5.zip" .
          python polaris-v5.zip | tee "$RUNNER_TEMP/install.log"

      - name: A fresh install is NOT a live board
        # The 5.2.0 regression guard. The installer used to ship the six empty board columns, so
        # every fresh install looked initialized: CLAUDE.md's dispatch never offered INIT, INIT.md's
        # precondition told the agent to refuse, and a re-run announced "live board detected".
        # ops/CONVENTIONS.md — written by INIT and by nothing else — is now the only test.
        run: |
          set -eo pipefail
          cd "$RUNNER_TEMP/app"
          test ! -d ops/board          || { echo "::error::installer created ops/board/ — a fresh install must not look initialized"; exit 1; }
          test ! -f ops/CONVENTIONS.md || { echo "::error::installer wrote CONVENTIONS.md — only INIT may"; exit 1; }
          grep -q 'You are INIT' "$RUNNER_TEMP/install.log" || { echo "::error::installer did not route a fresh repo to INIT"; exit 1; }
          # Capture, THEN grep. `doctor | grep -q` is a trap: grep -q exits on the first match and
          # closes the pipe, doctor dies of SIGPIPE (141), and `pipefail` fails the whole pipeline
          # even though doctor said exactly what we wanted. That is what has been reddening this
          # job since the step was written — a bug in the test, never in doctor.
          bash ops/polaris doctor > "$RUNNER_TEMP/doctor.log"
          grep -q 'INIT has not run' "$RUNNER_TEMP/doctor.log" || { echo "::error::doctor does not report the uninitialized repo"; exit 1; }
          # re-run must STILL route to INIT, not to `polaris upgrade`
          python polaris-v5.zip | tee "$RUNNER_TEMP/reinstall.log"
          grep -q 'You are INIT' "$RUNNER_TEMP/reinstall.log" || { echo "::error::re-run misrouted an uninitialized repo"; exit 1; }
          ! grep -q 'live board'  "$RUNNER_TEMP/reinstall.log" || { echo "::error::re-run called an uninitialized repo a live board"; exit 1; }
          echo "fresh-install predicate OK"

      - name: A live board IS detected (and never overwritten)
        run: |
          set -eo pipefail
          cd "$RUNNER_TEMP/app"
          bash ops/polaris init-board >/dev/null
          printf '# CONVENTIONS\nbase: main\nvoice: technical\ntest: echo hi\n' > ops/CONVENTIONS.md
          python polaris-v5.zip | tee "$RUNNER_TEMP/upgrade.log"
          grep -q 'live board detected' "$RUNNER_TEMP/upgrade.log" || { echo "::error::live board not detected"; exit 1; }
          grep -q 'polaris upgrade'     "$RUNNER_TEMP/upgrade.log" || { echo "::error::live board not routed to upgrade"; exit 1; }
          grep -q 'voice: technical'    ops/CONVENTIONS.md || { echo "::error::installer overwrote CONVENTIONS.md"; exit 1; }
          bash ops/polaris doctor > "$RUNNER_TEMP/doctor-voice.log"     # not `| grep -q` — see SIGPIPE note above
          grep -q 'voice: technical' "$RUNNER_TEMP/doctor-voice.log" || { echo "::error::doctor does not report the configured voice"; exit 1; }
          # leave the scratch repo uninitialized again, so the steps below see a virgin install
          rm -rf ops/CONVENTIONS.md ops/board ops/contracts
          echo "live-board predicate OK"

      - name: Merge was non-destructive
        run: |
          set -e
          cd "$RUNNER_TEMP/app"
          grep -q MY_OWN_RULE CLAUDE.md            || { echo "::error::user CLAUDE.md content lost"; exit 1; }
          grep -qF 'POLARIS:BEGIN' CLAUDE.md       || { echo "::error::managed block markers missing"; exit 1; }
          grep -q MY_OWN_HOOK .claude/settings.json|| { echo "::error::user hook lost"; exit 1; }
          grep -q ownership-guard .claude/settings.json || { echo "::error::guard hook not merged"; exit 1; }
          python -c "import json;json.load(open('.claude/settings.json'))"
          test -f src/app.py                       || { echo "::error::user source lost"; exit 1; }
          echo "merge OK"

      - name: doctor --selftest  (the full mechanics drill)
        run: |
          cd "$RUNNER_TEMP/app"
          bash ops/polaris doctor --selftest

      - name: macOS — the same drill under /bin/bash 3.2
        # THE reason macOS is in this matrix. GitHub's macOS image puts a newer Homebrew bash
        # earlier on PATH, so the step above silently tests bash 5 and proves nothing about the
        # 3.2 compatibility the script claims. Pin the interpreter and assert the version.
        if: matrix.os == 'macos-latest'
        run: |
          set -e
          V="$(/bin/bash -c 'echo $BASH_VERSION')"
          echo "/bin/bash is $V"
          case "$V" in 3.2*) ;; *) echo "::error::expected bash 3.2 at /bin/bash, got $V"; exit 1;; esac
          cd "$RUNNER_TEMP/app"
          /bin/bash ops/polaris doctor --selftest

      - name: Uninstall leaves the repo as it was found
        run: |
          set -e
          cd "$RUNNER_TEMP/app"
          bash ops/polaris uninstall --yes
          test ! -d ops                              || { echo "::error::ops/ survived uninstall"; exit 1; }
          grep -q MY_OWN_RULE CLAUDE.md              || { echo "::error::uninstall ate the user's CLAUDE.md"; exit 1; }
          ! grep -qF 'POLARIS:BEGIN' CLAUDE.md       || { echo "::error::managed block survived uninstall"; exit 1; }
          grep -q MY_OWN_HOOK .claude/settings.json  || { echo "::error::uninstall ate the user's hook"; exit 1; }
          ! grep -q ownership-guard .claude/settings.json || { echo "::error::guard hook survived uninstall"; exit 1; }
          echo "uninstall OK"
