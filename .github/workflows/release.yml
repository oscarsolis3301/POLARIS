# Publishes the draggable kit. Tag a release (`git tag v5.1.0 && git push --tags`) and the zip is
# built by CI and attached to the GitHub Release — so the kit is one download away for anyone, and
# the published artifact is never a stale hand-built one.
#
# This is convenience only. It does NOT feed the update check: that reads `version:` from
# ops/VERSION on main via raw.githubusercontent, so there is no second source of truth.
name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  zip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Tag must match kit/ops/VERSION
        # kit/ops/VERSION, not ops/VERSION. This repo self-hosts POLARIS: kit/ is the product, and the
        # root ops/ is an installation of the last PUBLISHED release — deliberately NOT the version
        # being cut here. Reading the instance would compare the new tag against the previous release.
        run: |
          tag="${GITHUB_REF_NAME#v}"
          ver="$(sed -n 's/^version: *//p' kit/ops/VERSION | head -1)"
          [ "$tag" = "$ver" ] || {
            echo "::error::tag $GITHUB_REF_NAME does not match kit/ops/VERSION ($ver) — bump with: python kit/ops/pack.py --bump"
            exit 1
          }

      - run: python kit/ops/pack.py

      - name: Archive integrity — exec bits, LF, zipapp
        # Same check as ci.yml: read the mode stored IN the archive. An extracted-file check is
        # vacuous on Windows and would let a kit that is dead on arrival get published.
        run: |
          python - <<'PY'
          import sys, zipfile
          NEED_EXEC = {
              "polaris-v5/ops/polaris",
              "polaris-v5/ops/install.sh",
              "polaris-v5/ops/hooks/ownership-guard.sh",
          }
          z = zipfile.ZipFile("polaris-v5.zip")
          names = set(z.namelist())
          bad = []
          if "__main__.py" not in names:
              bad.append("__main__.py missing — not a zipapp, `python polaris-v5.zip` would fail")
          for want in NEED_EXEC:
              if want not in names:
                  bad.append(f"{want} missing"); continue
              if not ((z.getinfo(want).external_attr >> 16) & 0o111):
                  bad.append(f"{want} lost its exec bit — kit would be DOA")
          for info in z.infolist():
              if not info.is_dir() and b"\r\n" in z.read(info.filename):
                  bad.append(f"CRLF in {info.filename}")
          if bad:
              for b in sorted(set(bad)):
                  print(f"::error::{b}")
              sys.exit(1)
          print("archive OK")
          PY

      - name: Smoke — the artifact we are about to publish actually installs
        run: |
          set -e
          APP="$RUNNER_TEMP/app"; mkdir -p "$APP"; cd "$APP"
          git init -qb main
          git config user.email ci@example.com && git config user.name ci
          echo x > file.txt && git add -A && git commit -qm init
          cp "$GITHUB_WORKSPACE/polaris-v5.zip" .
          python polaris-v5.zip
          bash ops/polaris doctor --selftest

      - uses: softprops/action-gh-release@v2
        with:
          files: polaris-v5.zip
          generate_release_notes: true
          body: |
            **Drop-in POLARIS kit — one file, no `.git`, works in a greenfield folder or a 10k-file repo.**

            In Claude Code, in your project, say:

            ```
            install POLARIS from github.com/oscarsolis3301/POLARIS
            ```

            It installs, arms the machine (so every install after this one is offline and
            prompt-free), interviews you, and plans your first sprint — **in the same chat**.
            Then say `start` to build. No second session, no homework.

            By hand:

            ```bash
            curl -fsSLO https://github.com/oscarsolis3301/POLARIS/releases/latest/download/polaris-v5.zip
            python polaris-v5.zip
            ```

            Verified by this run on Linux, macOS (bash 3.2) and Windows: exec bits survive the
            archive, no CRLF, installs non-destructively over an existing `CLAUDE.md` and hooks,
            and `doctor --selftest` passes. See `CHANGELOG.md`.
